spring:
  application:
    name: VedPharm CRM

  profiles:
    active: local

  datasource:
    url: jdbc:postgresql://localhost:5432/vedpharm
    username: ${DB_USERNAME:vedpharm_user}
    password: ${DB_PASSWORD:vedpharm_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

  docker:
    compose:
      lifecycle-management: none

  data:
    redis:
      host: localhost
      port: 6379

  cache:
    type: redis
    redis:
      time-to-live: 3600000

server:
  port: 8080

application:
  jwt:
    secret: ${JWT_SECRET:SyPKjFZSlcrmHNcEb5/ZvGJo2RQFQFZK1eS33ugNN9A=}
    expiration-ms: 86400000
    refresh-expiration-ms: 604800000

vedpharm:
  company:
    state: Maharashtra

# ── OpenAI Configuration ──────────────────────────────────────────────────────
# api-key lives in application-local.yml which is gitignored — never pushed
# model: gpt-4o-mini — cheapest, fastest, sufficient for all 6 AI features
# max-tokens: 1000 — hard cap per call — controls cost
# timeout-seconds: 30 — AI calls can be slow — don't let them hang forever
openai:
  api-key: ${OPENAI_API_KEY:your-key-goes-in-application-local.yml}
  model: gpt-4o-mini
  max-tokens: 1000
  timeout-seconds: 30

logging:
  level:
    org.springframework.data.repository.config.RepositoryConfigurationExtensisupport: ERROR